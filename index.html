<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Workout Timer</h1>
        </header>

        <section id="settings" class="settings-grid">
            <div class="input-group">
                <label for="prepTime">Подготовка (сек):</label>
                <input type="number" id="prepTime" min="0" placeholder="0">
            </div>
            <div class="input-group">
                <label for="phase1Time">Фаза 1 (сек):</label>
                <input type="number" id="phase1Time" min="0" placeholder="0">
            </div>
            <div class="input-group">
                <label for="pauseTime">Пауза (сек):</label>
                <input type="number" id="pauseTime" min="0" placeholder="0">
            </div>
            <div class="input-group">
                <label for="phase2Time">Фаза 2 (сек):</label>
                <input type="number" id="phase2Time" min="0" placeholder="0">
            </div>
            <div class="input-group">
                <label for="reps">Количество повторений:</label>
                <input type="number" id="reps" min="1" placeholder="1">
            </div>
        </section>

        <section id="display" class="hidden">
            <div id="status-container">
                <div id="reps-display">Раунд: <span id="remaining-reps">0</span> / <span id="total-reps">0</span></div>
                <h2 id="current-phase">Подготовка</h2>
                <div id="timer-display">00:00</div>
            </div>
        </section>

        <div class="controls">
            <button id="startBtn" class="btn btn-primary">Старт</button>
            <button id="pauseBtn" class="btn btn-secondary hidden">Пауза</button>
            <button id="resumeBtn" class="btn btn-primary hidden">Продолжить</button>
            <button id="restartBtn" class="btn btn-primary hidden">Заново</button>
            <button id="menuBtn" class="btn btn-secondary hidden">В меню</button>
            <button id="stopBtn" class="btn btn-danger hidden">Стоп</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
